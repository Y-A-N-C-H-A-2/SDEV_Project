# Render Blueprint: https://render.com/docs/blueprint-spec
# Create via Dashboard → New → Blueprint → connect this repo.
# Adjust `region` / `plan` in the dashboard if your account requires it.

databases:
  - name: crosspaths-db
    databaseName: crosspaths
    user: crosspaths

services:
  - type: web
    name: crosspaths-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crosspaths-db
          property: connectionString
