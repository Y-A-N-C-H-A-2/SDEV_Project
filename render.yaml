# Render Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo → apply this file.
# Web service builds from ./Dockerfile (gunicorn uses $PORT from Render).

databases:
  - name: crosspaths-db
    databaseName: crosspaths
    user: crosspaths

services:
  - type: web
    name: crosspaths-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi:app
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crosspaths-db
          property: connectionString
