# Render Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo → apply this file.
#
# SQLite only (no managed Postgres): omit DATABASE_URL so the app uses
# /app/crosspaths.db inside the container. Instance disk is ephemeral on Render —
# data is lost on redeploy unless you add a persistent disk and point the DB there
# (e.g. set DATABASE_URL to sqlite:////data/crosspaths.db and mount /data).
# AUTO_DB_SETUP recreates tables + seed when the file is missing or after a fresh deploy.
#
# SECRET_KEY + generateValue: Render only auto-generates if the variable is absent.
# If deploy logs show "SECRET_KEY ... not set", add SECRET_KEY in the Dashboard
# (openssl rand -base64 32) or delete an empty SECRET_KEY and redeploy.

services:
  - type: web
    name: crosspaths-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi:app
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: AUTO_DB_SETUP
        value: "1"
