<!-- Ukrainian: Formal, structured profile layout -->
<section class="profile-section-formal">
    <div class="profile-header-formal">
        <div class="profile-avatar-placeholder">
            <span class="avatar-icon">👤</span>
        </div>
        <div class="profile-basic-info">
            <h2>{{ profile.name }}</h2>
            <p>{{ _('Member since') }} {{ _('March 2026') }}</p>
        </div>
    </div>

    <div class="profile-details-formal">
        <div class="profile-field">
            <label>{{ _('Age:') }}</label>
            <span>{{ profile.age }}</span>
        </div>
        <div class="profile-field">
            <label>{{ _('Country of Origin:') }}</label>
            <span>{{ profile.country }}</span>
        </div>
        <div class="profile-field">
            <label>{{ _('Languages:') }}</label>
            <span>{{ profile.languages|join(', ') }}</span>
        </div>
        <div class="profile-field">
            <label>{{ _('Interests:') }}</label>
            <span>{{ profile.interests|join(', ') }}</span>
        </div>
        <div class="profile-field">
            <label>{{ _('About:') }}</label>
            <p>{{ profile.bio }}</p>
        </div>
    </div>

    <div class="profile-actions">
        <button class="btn btn-primary">{{ _('Edit Profile') }}</button>
        <button class="btn btn-secondary">{{ _('Privacy Settings') }}</button>
    </div>
</section>
