# Babel Configuration for CrossPaths
# Specifies which files to extract translatable strings from

[extractors]
jinja2 = jinja2.ext:babel_extract

[python: app/**/*.py]
[python: app/*.py]
[python: run.py]
[jinja2: app/templates/**/*.html]
[jinja2: app/templates/*.html]
encoding = utf-8
extensions = jinja2.ext.i18n
