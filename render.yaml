# Render Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo → apply this file.
# Python native runtime (not Docker). Uses .python-version for the Python series.

databases:
  - name: crosspaths-db
    databaseName: crosspaths
    user: crosspaths

services:
  - type: web
    name: crosspaths-web
    runtime: python
    buildCommand: pip install -r requirements.txt && pybabel compile -d translations
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi:app
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crosspaths-db
          property: connectionString
